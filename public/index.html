<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cli-prompt-cron</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #F8F6F0;
      color: #2C3E50;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Yu Gothic', sans-serif;
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: #fff;
      border-bottom: 2px solid #4A7FA5;
      padding: 11px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    }
    .header-icon { font-size: 20px; line-height: 1; }
    header h1 {
      font-size: 17px;
      font-weight: 700;
      color: #4A7FA5;
      letter-spacing: 0.02em;
    }
    .version-tag {
      background: #4A7FA5;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 12px;
      letter-spacing: 0.05em;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }
    header .subtitle {
      font-size: 11px;
      color: #A0AAB4;
      margin-left: 2px;
    }
    .header-spacer { flex: 1; }
    .live-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #7F8C8D;
    }
    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #27AE60;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Section label ── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: #7F8C8D;
      letter-spacing: 0.06em;
      padding: 10px 16px 6px;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    /* ── Jobs area ── */
    #jobs-area {
      background: #F8F6F0;
      border-bottom: 1px solid #E4DFD6;
      flex-shrink: 0;
    }
    #jobs-scroll {
      display: flex;
      gap: 10px;
      padding: 4px 16px 14px;
      overflow-x: auto;
      scrollbar-width: thin;
    }
    #jobs-scroll::-webkit-scrollbar { height: 4px; }
    #jobs-scroll::-webkit-scrollbar-thumb { background: #D5D8DC; border-radius: 2px; }

    /* Job card */
    .job-card {
      background: #fff;
      border-radius: 12px;
      padding: 12px 15px;
      min-width: 200px;
      max-width: 280px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      flex-shrink: 0;
      border: 1px solid #EAE6DE;
      transition: box-shadow 0.2s, transform 0.15s;
    }
    .job-card:hover {
      box-shadow: 0 4px 14px rgba(74,127,165,0.14);
      transform: translateY(-1px);
    }
    .job-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .status-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.03em;
    }
    .status-active   { background: #D5F0E0; color: #1E8449; }
    .status-inactive { background: #EAECEE; color: #7F8C8D; }
    .job-card-name {
      font-size: 14px;
      font-weight: 600;
      color: #2C3E50;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      border-bottom: 1px dashed transparent;
    }
    .job-card-name:hover { border-bottom-color: #2C3E50; }
    .job-card-schedule {
      font-size: 13px;
      color: #4A7FA5;
      font-weight: 500;
      margin-bottom: 6px;
      cursor: pointer;
      border-bottom: 1px dashed transparent;
    }
    .job-card-schedule:hover { border-bottom-color: #4A7FA5; }
    .job-card-command {
      font-size: 11px;
      color: #5D6D7E;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.4;
      cursor: pointer;
      border-bottom: 1px dashed transparent;
    }
    .job-card-command:hover { border-bottom-color: #5D6D7E; }
    .job-card-flags {
      font-size: 10px;
      color: #7F8C8D;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      border-bottom: 1px dashed transparent;
    }
    .job-card-flags:hover { border-bottom-color: #7F8C8D; }
    .job-edit-input {
      width: 100%;
      font-family: inherit;
      border: 1px solid #4A7FA5;
      border-radius: 4px;
      padding: 3px 6px;
      outline: none;
      background: #FAFAF7;
    }
    .job-edit-input.edit-name { font-size: 14px; color: #2C3E50; font-weight: 600; }
    .job-edit-input.edit-cron { font-size: 13px; color: #4A7FA5; font-weight: 500; }
    .job-edit-input.edit-prompt { font-size: 11px; color: #5D6D7E; }
    .job-edit-input.edit-flags { font-size: 10px; color: #7F8C8D; }
    .job-card-next {
      font-size: 11px;
      color: #95A5A6;
    }
    .job-card-next strong { color: #7F8C8D; font-weight: 500; }

    .job-card-actions {
      margin-top: 10px;
    }
    .toggle-btn {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .toggle-btn.stop {
      background: #FADBD8;
      color: #C0392B;
    }
    .toggle-btn.stop:hover {
      background: #F1948A;
      color: #fff;
    }
    .toggle-btn.resume {
      background: #D5F0E0;
      color: #1E8449;
    }
    .toggle-btn.resume:hover {
      background: #82E0AA;
      color: #fff;
    }
    .toggle-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .running-badge { background: #FDEBD0; color: #CA6F1E; }

    /* ── Running section ── */
    #running-area {
      background: #FEF9E7;
      border-bottom: 1px solid #F0E6C8;
      flex-shrink: 0;
      display: block;
    }
    #running-scroll {
      display: flex;
      gap: 10px;
      padding: 4px 16px 10px;
      overflow-x: auto;
      scrollbar-width: thin;
    }
    .running-card {
      background: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      min-width: 200px;
      max-width: 300px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      flex-shrink: 0;
      border: 1px solid #F5D6A0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .running-card-info { flex: 1; min-width: 0; }
    .running-card-name {
      font-size: 13px;
      font-weight: 600;
      color: #2C3E50;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .running-card-elapsed {
      font-size: 11px;
      color: #CA6F1E;
      font-weight: 500;
    }
    .running-card-cmd {
      font-size: 10px;
      color: #7F8C8D;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .running-kill-btn {
      font-size: 11px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: #E74C3C;
      color: #fff;
      white-space: nowrap;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .running-kill-btn:hover { background: #C0392B; }
    .running-kill-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .running-empty {
      padding: 12px 0;
      color: #7F8C8D;
      font-size: 12px;
    }

    .no-jobs-card {
      padding: 16px;
      color: #BDC3C7;
      font-size: 13px;
    }

    /* ── Main bottom ── */
    main {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }
    #bottom {
      display: grid;
      grid-template-columns: 1fr 1fr;
      flex: 1;
      overflow: hidden;
    }

    /* ── Log section ── */
    #log-section {
      display: flex;
      flex-direction: column;
      border-right: 1px solid #E4DFD6;
      overflow: hidden;
    }
    #log-pane {
      flex: 1;
      overflow-y: auto;
      padding: 8px 14px 10px;
      background: #FAFAF7;
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
      font-size: 11.5px;
      line-height: 1.75;
    }
    .log-line {
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-fire   { color: #CA6F1E; }
    .log-exit   { color: #A0AAB4; }
    .log-stdout { color: #2C3E50; }
    .log-stderr { color: #C0392B; }
    .log-daemon { color: #4A7FA5; }

    /* ── Results section ── */
    #results-section {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #results-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 10px 10px;
    }
    .result-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12.5px;
      color: #5D6D7E;
      transition: background 0.15s;
      margin-bottom: 2px;
      line-height: 1.4;
    }
    .result-item:hover { background: #EEF3F8; color: #2C3E50; }
    .result-item.active { background: #D6E8F5; color: #2471A3; }
    .result-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4A7FA5;
      flex-shrink: 0;
      opacity: 0.6;
    }
    .result-item.active .result-dot { opacity: 1; }
    .no-items {
      padding: 16px;
      color: #BDC3C7;
      font-size: 12px;
      text-align: center;
    }

    /* ── Modal ── */
    #result-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(44,62,80,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #result-modal.open { display: flex; }
    #result-modal-inner {
      background: #fff;
      border-radius: 14px;
      width: 82vw;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    #result-modal-header {
      padding: 13px 18px;
      border-bottom: 1px solid #E4DFD6;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      background: #F8F6F0;
      border-radius: 14px 14px 0 0;
    }
    #result-modal-title {
      font-size: 13px;
      font-weight: 600;
      color: #2C3E50;
    }
    #result-modal-close {
      background: none;
      border: none;
      color: #7F8C8D;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    #result-modal-close:hover { background: #EEF3F8; color: #2C3E50; }
    #result-modal-body {
      overflow-y: auto;
      padding: 16px 20px;
      flex: 1;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-all;
      color: #2C3E50;
      line-height: 1.85;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D5D8DC; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #AEB6BF; }
  </style>
</head>
<body>

<header>
  <span class="header-icon">🕐</span>
  <h1>cli-prompt-cron</h1>
  <span class="version-tag">v__APP_VERSION__</span>
  <span class="subtitle">AIスケジューラー</span>
  <div class="header-spacer"></div>
  <div class="live-indicator">
    <span class="live-dot"></span>
    <span>ライブ</span>
  </div>
</header>

<main>
  <!-- Running -->
  <div id="running-area">
    <div class="section-label">⚡ 実行中</div>
    <div id="running-scroll"></div>
  </div>

  <!-- Jobs -->
  <div id="jobs-area">
    <div class="section-label">📋 スケジュール一覧</div>
    <div id="jobs-scroll">
      <div class="no-jobs-card">読み込み中...</div>
    </div>
  </div>

  <!-- Bottom: Log + Results -->
  <div id="bottom">
    <div id="log-section">
      <div class="section-label">📡 ライブログ</div>
      <div id="log-pane"></div>
    </div>
    <div id="results-section">
      <div class="section-label">📄 実行結果</div>
      <div id="results-list">
        <div class="no-items">読み込み中...</div>
      </div>
    </div>
  </div>
</main>

<!-- Result modal -->
<div id="result-modal">
  <div id="result-modal-inner">
    <div id="result-modal-header">
      <span id="result-modal-title"></span>
      <button id="result-modal-close" title="閉じる">&times;</button>
    </div>
    <pre id="result-modal-body"></pre>
  </div>
</div>

<script>
(function () {
  'use strict';

  /* ── XSS escape ── */
  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /* ── Date format ── */
  function fmt(date) {
    if (!date) return '—';
    const d = new Date(date);
    if (isNaN(d)) return '—';
    return d.toLocaleString('ja-JP', {
      month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit',
      hour12: false
    });
  }

  /* ── Relative time ── */
  function relativeTime(date) {
    if (!date) return null;
    const d = new Date(date);
    if (isNaN(d)) return null;
    const diff = d - Date.now();
    if (diff <= 0) return null;
    const secs = Math.floor(diff / 1000);
    if (secs < 60) return `あと ${secs} 秒`;
    const mins = Math.floor(diff / 60000);
    if (mins < 60) return `あと ${mins} 分`;
    const hours = Math.floor(diff / 3600000);
    if (hours < 24) return `あと ${hours} 時間`;
    if (hours < 48) return '明日 ' + d.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', hour12: false });
    return `あと ${Math.floor(hours / 24)} 日`;
  }

  /* ── Cron humanizer ── */
  function humanizeCron(expr) {
    if (!expr) return expr;
    const p = expr.trim().split(/\s+/);
    if (p.length !== 5) return expr;
    const [min, hour, dom, mon, dow] = p;
    const dowNames = ['日','月','火','水','木','金','土'];

    // */N every-N-minutes
    if (min.startsWith('*/') && hour === '*') {
      return `${min.slice(2)}分ごと`;
    }
    // */N every-N-hours
    if (hour.startsWith('*/') && min === '0') {
      return `${hour.slice(2)}時間ごと`;
    }

    // Time string
    let timeStr = null;
    if (hour !== '*' && min !== '*') {
      if (hour.includes(',')) {
        timeStr = hour.split(',').map(h => `${h.padStart(2,'0')}:${min.padStart(2,'0')}`).join('・');
      } else {
        timeStr = `${hour.padStart(2,'0')}:${min.padStart(2,'0')}`;
      }
    }

    // Day string
    let dayStr = '毎日';
    if (dow !== '*') {
      if (dow === '1-5') { dayStr = '平日（月〜金）'; }
      else if (dow === '0-4') { dayStr = '月〜木'; }
      else {
        const d = parseInt(dow);
        if (!isNaN(d) && d >= 0 && d <= 6) dayStr = `毎週${dowNames[d]}曜`;
        else dayStr = `曜日指定`;
      }
    } else if (dom !== '*') {
      dayStr = `毎月${dom}日`;
    }

    return timeStr ? `${dayStr} ${timeStr}` : expr;
  }

  /* ── Cron next-fire (client-side) ── */
  function parseCronField(field, min, max) {
    const values = new Set();
    for (const part of field.split(',')) {
      const stepSplit = part.split('/');
      const range = stepSplit[0];
      const step = stepSplit[1] ? parseInt(stepSplit[1], 10) : 1;
      let lo = min, hi = max;
      if (range !== '*') {
        const dash = range.split('-');
        lo = parseInt(dash[0], 10);
        hi = dash[1] !== undefined ? parseInt(dash[1], 10) : lo;
      }
      for (let v = lo; v <= hi; v += step) values.add(v);
    }
    return Array.from(values).sort((a, b) => a - b);
  }

  function nextCronFire(cronExpr) {
    try {
      const parts = cronExpr.trim().split(/\s+/);
      if (parts.length !== 5) return null;
      const [mF, hF, domF, monF, dowF] = parts;
      const minutes = parseCronField(mF, 0, 59);
      const hours   = parseCronField(hF, 0, 23);
      const doms    = parseCronField(domF, 1, 31);
      const months  = parseCronField(monF, 1, 12);
      const dows    = parseCronField(dowF, 0, 6);

      const now = new Date();
      now.setSeconds(0, 0);
      now.setMinutes(now.getMinutes() + 1);

      for (let i = 0; i < 366 * 24 * 60; i++) {
        const mo  = now.getMonth() + 1;
        const dom = now.getDate();
        const dow = now.getDay();
        const hr  = now.getHours();
        const mn  = now.getMinutes();

        if (months.includes(mo) &&
            (domF === '*' || doms.includes(dom)) &&
            (dowF === '*' || dows.includes(dow)) &&
            hours.includes(hr) &&
            minutes.includes(mn)) {
          return new Date(now);
        }
        now.setMinutes(now.getMinutes() + 1);
      }
      return null;
    } catch (e) { return null; }
  }

  /* ── Parse command into prompt and flags ── */
  function parseCommand(cmd) {
    if (!cmd) return { prompt: '', flags: '' };
    // Extract the last quoted string as the prompt
    const promptMatch = cmd.match(/['"]([^'"]+)['"]\s*$/);
    const prompt = promptMatch ? promptMatch[1] : '';
    // Everything before the prompt quote is the base command + flags
    const beforePrompt = promptMatch ? cmd.slice(0, cmd.lastIndexOf(promptMatch[0])).trim() : cmd;
    // Extract just the flags (--xxx parts) from the base command
    const flagParts = beforePrompt.match(/--[\w-]+/g) || [];
    const flags = flagParts.join(' ');
    return { prompt: prompt || cmd, flags };
  }

  /* ── Jobs ── */
  function renderJobs(jobs) {
    const scroll = document.getElementById('jobs-scroll');
    if (!jobs || jobs.length === 0) {
      scroll.innerHTML = '<div class="no-jobs-card">ジョブが登録されていません。</div>';
      return;
    }
    scroll.innerHTML = jobs.map(job => {
      const active = job.active !== false;
      const running = job.running || 0;
      let badge;
      if (running > 0) {
        badge = `<span class="status-badge running-badge">実行中${running > 1 ? ' x' + running : ''}</span>`;
      } else if (active) {
        badge = '<span class="status-badge status-active">稼働中</span>';
      } else {
        badge = '<span class="status-badge status-inactive">停止中</span>';
      }
      const schedule = humanizeCron(job.cron || '');
      const next = active ? nextCronFire(job.cron || '') : null;
      const rel = next ? relativeTime(next) : null;
      const nextLabel = rel ? `<strong>次回:</strong> ${esc(rel)}` : (next ? `<strong>次回:</strong> ${fmt(next)}` : '');
      const btnClass = active ? 'stop' : 'resume';
      const btnLabel = active ? '停止' : '再開';
      const cmd = job.command || '';
      const parsed = parseCommand(cmd);
      return `<div class="job-card" data-job-name="${esc(job.name)}">
        <div class="job-card-top">${badge}</div>
        <div class="job-card-name" data-field="name" data-raw="${esc(job.name || '')}" title="クリックで編集">${esc(job.name || job.id || '—')}</div>
        <div class="job-card-schedule" data-field="cron" data-raw="${esc(job.cron || '')}" title="クリックで編集">${esc(schedule)}</div>
        <div class="job-card-command" data-field="prompt" data-raw="${esc(parsed.prompt)}" title="クリックで編集">${esc(parsed.prompt || '(プロンプト未設定)')}</div>
        <div class="job-card-flags" data-field="flags" data-raw="${esc(parsed.flags)}" title="クリックで編集">${esc(parsed.flags || '(権限未設定)')}</div>
        ${nextLabel ? `<div class="job-card-next">${nextLabel}</div>` : ''}
        <div class="job-card-actions">
          <button class="toggle-btn ${btnClass}" data-job="${esc(job.name)}">${btnLabel}</button>
        </div>
      </div>`;
    }).join('');

    scroll.querySelectorAll('.toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => toggleJob(btn.dataset.job, btn));
    });

    // Wire inline editing
    scroll.querySelectorAll('[data-field]').forEach(el => {
      el.addEventListener('click', () => startInlineEdit(el));
    });

    // Render running section
    renderRunning(jobs);
  }

  /* ── Running section ── */
  let elapsedTimer = null;

  function formatElapsed(ms) {
    const sec = Math.floor(ms / 1000);
    if (sec < 60) return `${sec}秒`;
    const min = Math.floor(sec / 60);
    if (min < 60) return `${min}分${sec % 60}秒`;
    const hr = Math.floor(min / 60);
    return `${hr}時間${min % 60}分`;
  }

  function renderRunning(jobs) {
    const area = document.getElementById('running-area');
    const scroll = document.getElementById('running-scroll');

    // Collect all running processes across all jobs
    const running = [];
    for (const job of jobs) {
      if (job.runningProcesses && job.runningProcesses.length > 0) {
        for (const proc of job.runningProcesses) {
          running.push({ name: job.name, command: job.command, ...proc });
        }
      } else if (job.running > 0) {
        for (let i = 0; i < job.running; i++) {
          running.push({ name: job.name, command: job.command, pid: null, startedAt: null });
        }
      }
    }

    area.style.display = 'block';
    if (running.length === 0) {
      scroll.innerHTML = '<div class="running-empty">実行中のジョブはありません</div>';
      if (elapsedTimer) { clearInterval(elapsedTimer); elapsedTimer = null; }
      return;
    }

    scroll.innerHTML = running.map((r, i) => {
      const elapsed = r.startedAt ? Date.now() - new Date(r.startedAt).getTime() : null;
      const elapsedLabel = elapsed === null ? '稼働中' : formatElapsed(elapsed);
      const parsed = parseCommand(r.command || '');
      const cmdDisplay = parsed.prompt || r.command || '';
      return `<div class="running-card">
        <div class="running-card-info">
          <div class="running-card-name">${esc(r.name)}</div>
          <div class="running-card-elapsed" data-started="${esc(r.startedAt || '')}">${elapsedLabel}</div>
          <div class="running-card-cmd" title="${esc(cmdDisplay)}">${esc(cmdDisplay)}</div>
        </div>
        <button class="running-kill-btn" data-job="${esc(r.name)}">強制停止</button>
      </div>`;
    }).join('');

    // Wire kill buttons
    scroll.querySelectorAll('.running-kill-btn').forEach(btn => {
      btn.addEventListener('click', () => killProcess(btn.dataset.job, btn));
    });

    // Update elapsed time every second
    if (elapsedTimer) clearInterval(elapsedTimer);
    elapsedTimer = setInterval(() => {
      scroll.querySelectorAll('.running-card-elapsed').forEach(el => {
        const started = el.dataset.started;
        if (started) {
          el.textContent = formatElapsed(Date.now() - new Date(started).getTime());
        }
      });
    }, 1000);
  }

  /* ── Inline editing ── */
  function startInlineEdit(el) {
    if (el.querySelector('input')) return; // already editing
    const field = el.dataset.field;
    const raw = el.dataset.raw || '';
    const card = el.closest('.job-card');
    const jobName = card.dataset.jobName;

    const cssClasses = { name: 'edit-name', cron: 'edit-cron', prompt: 'edit-prompt', flags: 'edit-flags' };
    const placeholders = { name: 'ジョブ名', cron: '例: 0 9 * * *', prompt: 'プロンプトを入力', flags: '例: --full-auto' };
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'job-edit-input ' + (cssClasses[field] || '');
    input.value = raw;
    input.placeholder = placeholders[field] || '';

    el.textContent = '';
    el.appendChild(input);
    input.focus();
    input.select();
    editing = true;

    function cancel() {
      editing = false;
      input.removeEventListener('blur', onBlur);
      fetchJobs();
    }

    async function save() {
      editing = false;
      input.removeEventListener('blur', onBlur);
      const newVal = input.value.trim();
      if (!newVal || newVal === raw) { cancel(); return; }

      if (field === 'name') {
        const res = await patchJob(jobName, { name: newVal });
        if (res && !res.ok) {
          const err = await res.json().catch(() => ({}));
          alert(err.error || 'リネーム失敗');
        }
      } else if (field === 'cron') {
        await patchJob(jobName, { cron: newVal });
      } else {
        // Get current full command from API
        const jobs = await fetch('/api/jobs').then(r => r.json());
        const jobData = jobs.find(j => j.name === jobName);
        const origCmd = jobData?.command || '';

        // Extract base command (e.g. "codex exec") — everything before first flag or quote
        const baseMatch = origCmd.match(/^(.*?)(?=\s+--|\s+['"])/);
        const base = baseMatch ? baseMatch[1].trim() : origCmd.split(/\s*['"][^'"]*['"]\s*$/)[0].trim();

        const promptEl = card.querySelector('[data-field="prompt"]');
        const flagsEl = card.querySelector('[data-field="flags"]');
        const newPrompt = field === 'prompt' ? newVal : (promptEl?.dataset.raw || '');
        const newFlags = field === 'flags' ? newVal : (flagsEl?.dataset.raw || '');

        const parts = [base];
        if (newFlags) parts.push(newFlags);
        if (newPrompt) parts.push(`'${newPrompt}'`);
        await patchJob(jobName, { command: parts.join(' ') });
      }
      fetchJobs();
    }

    function onBlur() { save(); }
    input.addEventListener('blur', onBlur);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); save(); }
      if (e.key === 'Escape') { e.preventDefault(); cancel(); }
    });
  }

  async function patchJob(name, updates) {
    try {
      return await fetch('/api/jobs/' + encodeURIComponent(name), {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(updates),
      });
    } catch (_) { return null; }
  }

  async function toggleJob(name, btn) {
    btn.disabled = true;
    try {
      const res = await fetch('/api/jobs/' + encodeURIComponent(name), { method: 'PATCH' });
      if (res.ok) {
        await fetchJobs();
      }
    } catch (_) {}
    btn.disabled = false;
  }

  async function killProcess(name, btn) {
    if (!confirm(`「${name}」の実行中プロセスを強制停止しますか？`)) return;
    btn.disabled = true;
    try {
      const res = await fetch('/api/running/' + encodeURIComponent(name), { method: 'DELETE' });
      if (res.ok) {
        setTimeout(fetchJobs, 1000);
      }
    } catch (_) {}
    btn.disabled = false;
  }

  async function fetchJobs() {
    try {
      const res = await fetch('/api/jobs');
      if (!res.ok) return;
      const data = await res.json();
      renderJobs(Array.isArray(data) ? data : (data.jobs || []));
    } catch (_) {}
  }

  let editing = false;
  fetchJobs();
  setInterval(() => { if (!editing) fetchJobs(); }, 5000);

  /* ── Live Log (SSE) ── */
  const MAX_LINES = 200;
  const logPane = document.getElementById('log-pane');
  let logLines = 0;

  function classifyLine(text) {
    if (/FIRE/i.test(text))   return 'log-fire';
    if (/EXIT/i.test(text))   return 'log-exit';
    if (/stderr/i.test(text) && /error|fail|exception|panic|fatal/i.test(text)) return 'log-stderr';
    if (/daemon/i.test(text)) return 'log-daemon';
    return 'log-stdout';
  }

  function appendLog(text) {
    while (logLines >= MAX_LINES && logPane.firstChild) {
      logPane.removeChild(logPane.firstChild);
      logLines--;
    }
    const line = document.createElement('div');
    line.className = 'log-line ' + classifyLine(text);
    line.textContent = text;
    logPane.appendChild(line);
    logLines++;
    logPane.scrollTop = logPane.scrollHeight;
  }

  /* ── Desktop notification ── */
  let notifPermission = Notification.permission;
  if (notifPermission === 'default') {
    Notification.requestPermission().then(p => { notifPermission = p; });
  }

  async function notifyResult(jobName, filename) {
    if (notifPermission !== 'granted') return;
    let body = '';
    try {
      const res = await fetch('/api/results/' + encodeURIComponent(filename));
      if (res.ok) {
        const text = await res.text();
        body = text.slice(0, 300) + (text.length > 300 ? '…' : '');
      }
    } catch { /* ignore */ }
    const n = new Notification(`✅ ${jobName} 完了`, {
      body: body || '実行結果を確認してください',
      icon: '🕐',
      tag: filename,
    });
    n.onclick = () => { window.focus(); openResult(filename); n.close(); };
  }

  function connectSSE() {
    const es = new EventSource('/api/logs/stream');
    es.onmessage = e => {
      if (!e.data) return;
      appendLog(e.data);
      // Detect result saved → desktop notification
      const m = e.data.match(/\[([^\]]+)\] Result saved → (.+)$/);
      if (m) notifyResult(m[1], m[2].trim());
    };
    es.onerror = () => { es.close(); setTimeout(connectSSE, 3000); };
  }
  connectSSE();

  /* ── Results ── */
  const resultsList = document.getElementById('results-list');
  let activeResultFile = null;

  function renderResults(files) {
    if (!files || files.length === 0) {
      resultsList.innerHTML = '<div class="no-items">実行結果はまだありません。</div>';
      return;
    }
    resultsList.innerHTML = files.map(f => {
      const name = typeof f === 'string' ? f : (f.filename || f.name || JSON.stringify(f));
      const isActive = name === activeResultFile;
      return `<div class="result-item${isActive ? ' active' : ''}" data-file="${esc(name)}">
        <span class="result-dot"></span>${esc(name)}
      </div>`;
    }).join('');
    resultsList.querySelectorAll('.result-item').forEach(el => {
      el.addEventListener('click', () => openResult(el.dataset.file));
    });
  }

  async function fetchResults() {
    try {
      const res = await fetch('/api/results');
      if (!res.ok) return;
      const data = await res.json();
      renderResults(Array.isArray(data) ? data : (data.files || data.results || []));
    } catch (_) {}
  }

  fetchResults();
  setInterval(fetchResults, 10000);

  /* ── Result modal ── */
  const modal      = document.getElementById('result-modal');
  const modalTitle = document.getElementById('result-modal-title');
  const modalBody  = document.getElementById('result-modal-body');
  const modalClose = document.getElementById('result-modal-close');

  async function openResult(filename) {
    activeResultFile = filename;
    resultsList.querySelectorAll('.result-item').forEach(el => {
      el.classList.toggle('active', el.dataset.file === filename);
    });
    try {
      const res  = await fetch('/api/results/' + encodeURIComponent(filename));
      const text = await res.text();
      modalTitle.textContent = filename;
      modalBody.textContent  = text;
      modal.classList.add('open');
    } catch (e) {
      modalTitle.textContent = filename;
      modalBody.textContent  = 'エラー: ' + e.message;
      modal.classList.add('open');
    }
  }

  function closeModal() {
    modal.classList.remove('open');
    activeResultFile = null;
    resultsList.querySelectorAll('.result-item').forEach(el => el.classList.remove('active'));
  }

  modalClose.addEventListener('click', closeModal);
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

})();
</script>
</body>
